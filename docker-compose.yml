version: '3.8'

services:

  postgres_db:
    image: postgres:15
    container_name: fitpersona_db
    restart: always
    environment:
      POSTGRES_DB: fitpersona
      POSTGRES_USER: fitatuser
      POSTGRES_PASSWORD: fitpassword123
    volumes:
      - ./pgdata:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: fitpersona_backend
    restart: always
    environment:
      SPRING_PROFILES_ACTIVE: prod
    depends_on:
      - postgres_db

  frontend:
    build: ./frontend
    container_name: fitpersona_frontend
    restart: always
    depends_on:
      - backend
    ports:
      - "80:80"

